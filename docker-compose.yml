services:
  db:
    image: mysql:8.0
    container_name: db_imobiliaria
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
  api:
    build: .
    container_name: api_imobiliaria
    depends_on:
      - redis
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
      - DB_PORT=${DB_PORT:-3306}
      - API_PORT=3333
      - JWT_SECRET=${JWT_SECRET}
      - PDF_INTERNAL_API_KEY=${PDF_INTERNAL_API_KEY}
      - PDF_WORKER_ENABLED=${PDF_WORKER_ENABLED:-false}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}

    ports:
      - "3333:3333"
    volumes:
      - .:/usr/app 
      - /usr/app/node_modules
  redis:
    image: redis:alpine
    container_name: redis_imobiliaria
    restart: always
    ports:
      - "6379:6379"

volumes:
  mysql_data:
